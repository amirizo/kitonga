<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kitonga Wi-Fi — Redirecting</title>

  <!-- Immediate redirect to your site -->
  <meta http-equiv="refresh" content="0;url=https://kitonga.klikcell.com/">

  <style>
    body { font-family: Arial, Helvetica, sans-serif; background:#f7fafc; color:#222; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:white; padding:20px 24px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.08); max-width:520px; text-align:center; }
    .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>
    // JS redirect fallback (in case meta refresh is blocked)
    setTimeout(function() {
      window.location.href = "https://kitonga.klikcell.com/";
    }, 100);
  </script>
</head>

<body>
  <div class="card">
    <h2>Redirecting to Kitonga...</h2>
    <div class="spinner"></div>
    <p>If you are not redirected automatically, <a href="https://kitonga.klikcell.com/">click here</a>.</p>
  </div>
</body>
</html>
