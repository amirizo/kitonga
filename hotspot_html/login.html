<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitonga WiFi - Connecting...</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.06);
            padding: 36px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            max-width: 520px;
            width: 92%;
        }
        .logo {
            font-size: 2.1em;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }
        .loading { margin: 18px 0; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.22);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 46px;
            height: 46px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
        .message { margin: 14px 0; font-size: 1.05em; }
        .info { font-size: 0.9em; opacity: 0.85; margin-top: 10px; }
        .manual-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 22px;
            margin-top: 18px;
            transition: background 0.25s ease;
            border: 1px solid rgba(255,255,255,0.14);
        }
        .manual-link:hover { background: rgba(255,255,255,0.18); }
        .small { font-size: 0.85em; opacity: 0.8; }
        .debug-panel {
            margin-top: 14px;
            background: rgba(0,0,0,0.25);
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            display: none;
            max-height: 320px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
        }
        .debug-toggle { margin-top:12px; cursor: pointer; font-size:0.85em; color: #fff; opacity:0.85; }
        .countdown { font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📶 Kitonga WiFi</div>

        <div class="loading">
            <div class="spinner" aria-hidden="true"></div>
        </div>

        <div class="message">
            Connecting you to the WiFi portal... <span class="countdown" id="countdown">2</span>
        </div>

        <div class="info small" id="status">Preparing connection, please wait.</div>

        <!-- Manual fallback link (will be updated dynamically) -->
        <a id="manualLink" class="manual-link" href="#">Continue to Portal</a>

        <div class="debug-toggle" id="debugToggle">Show debug info</div>
        <div class="debug-panel" id="debugPanel" aria-hidden="true"></div>

        <!-- Keep original MikroTik placeholders as data attributes so router substitutions are preserved if present -->
        <div id="mkPlaceholders" style="display:none"
             data-mac="$(mac)"
             data-ip="$(ip)"
             data-username="$(username)"
             data-link-login="$(link-login)"
             data-link-orig="$(link-orig)"
             data-ssid="$(ssid)"
             data-ap-mac="$(ap-mac)"
             data-uamip="$(uamip)"
             data-uamport="$(uamport)"
        ></div>
    </div>

    <script>
        (function(){
            'use strict';

            // Utility: parse query string into object
            function parseQuery(qs) {
                var s = qs || window.location.search || '';
                if (!s) return {};
                if (s.charAt(0) === '?') s = s.substring(1);
                var parts = s.split('&');
                var out = {};
                for (var i=0;i<parts.length;i++){
                    var p = parts[i];
                    if (!p) continue;
                    var kv = p.split('=');
                    try{
                        var k = decodeURIComponent(kv[0]);
                        var v = kv.length>1?decodeURIComponent(kv.slice(1).join('=')):'':'';
                        out[k]=v;
                    }catch(e){ /* ignore bad encoding */ }
                }
                return out;
            }

            // Get value from MikroTik placeholders or querystring
            function getVar(name, qs, placeholders) {
                // Check query string first
                if (qs[name]) return qs[name];

                // Placeholder key mapping to dataset attr
                var ph = placeholders['data-' + name.replace(/_/g,'-')];
                if (ph && ph.indexOf('$(') === -1) {
                    // If router already substituted it won't contain $(...) pattern
                    return ph;
                }

                // try common alternative keys
                var alt = {
                    'link_login': 'link-login',
                    'link_orig': 'link-orig',
                    'ap_mac': 'ap-mac'
                };
                if (alt[name] && placeholders['data-' + alt[name]]){
                    var v = placeholders['data-' + alt[name]];
                    if (v && v.indexOf('$(') === -1) return v;
                }

                return '';
            }

            function buildPortalUrl(params) {
                var base = 'https://kitonga.klikcell.com/';
                var entries = [];
                Object.keys(params).forEach(function(k){
                    if (params[k] === undefined || params[k] === null || params[k] === '') return;
                    entries.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
                });
                if (entries.length) return base + '?' + entries.join('&');
                return base;
            }

            var qs = parseQuery();
            var phEl = document.getElementById('mkPlaceholders');
            var placeholders = phEl ? phEl.dataset : {};

            // Collect variables from query string and placeholders
            var mac = getVar('mac', qs, placeholders) || getVar('ap_mac', qs, placeholders) || '';
            var ip = getVar('ip', qs, placeholders) || getVar('uamip', qs, placeholders) || '';
            var username = getVar('username', qs, placeholders) || '';
            var link_login = getVar('link_login', qs, placeholders) || '';
            var link_orig = getVar('link_orig', qs, placeholders) || '';
            var ssid = getVar('ssid', qs, placeholders) || '';
            var ap_mac = getVar('ap_mac', qs, placeholders) || '';
            var uamip = getVar('uamip', qs, placeholders) || '';
            var uamport = getVar('uamport', qs, placeholders) || '';

            // Add telemetry
            var ua = navigator.userAgent || '';
            var ts = new Date().toISOString();

            // Build params object; keep both original keys and friendly keys
            var params = {
                mac: mac || undefined,
                ip: ip || undefined,
                username: username || undefined,
                link_login: link_login || undefined,
                link_orig: link_orig || undefined,
                ssid: ssid || undefined,
                ap_mac: ap_mac || undefined,
                uamip: uamip || undefined,
                uamport: uamport || undefined,
                source: 'mikrotik',
                ua: ua,
                ts: ts,
                // Add device info for payment integration
                device_mac: mac || ap_mac || undefined,
                device_ip: ip || uamip || undefined
            };

            // Build final URL
            var finalUrl = buildPortalUrl(params);

            // Update manual link
            var manual = document.getElementById('manualLink');
            manual.setAttribute('href', finalUrl);

            // Prepare debug panel content
            var dbg = {
                finalUrl: finalUrl,
                parsedQuery: qs,
                placeholders: placeholders,
                collected: params
            };
            var debugPanel = document.getElementById('debugPanel');
            debugPanel.textContent = JSON.stringify(dbg, null, 2);

            // Toggle debug
            var toggle = document.getElementById('debugToggle');
            toggle.addEventListener('click', function(){
                if (debugPanel.style.display === 'block'){
                    debugPanel.style.display = 'none';
                    debugPanel.setAttribute('aria-hidden','true');
                    toggle.textContent = 'Show debug info';
                } else {
                    debugPanel.style.display = 'block';
                    debugPanel.setAttribute('aria-hidden','false');
                    toggle.textContent = 'Hide debug info';
                }
            });

            // Simplified redirect logic - just redirect after a short countdown
            var countdownEl = document.getElementById('countdown');
            var statusEl = document.getElementById('status');
            var waitSeconds = 2; // Reduced wait time

            function doRedirect(){
                statusEl.textContent = 'Redirecting to portal...';
                // Direct redirect without connectivity testing
                window.location.replace(finalUrl);
            }

            // Show countdown and then redirect immediately
            var counter = waitSeconds;
            countdownEl.textContent = counter;
            
            // Update countdown display
            var counterTimer = setInterval(function(){
                counter -= 1;
                countdownEl.textContent = counter;
                if (counter <= 0){ 
                    clearInterval(counterTimer); 
                    doRedirect(); 
                }
            }, 1000);

            // Also provide immediate redirect option
            setTimeout(function(){
                manual.style.display = 'inline-block';
                manual.style.opacity = '0.8';
            }, 500);

            // If user clicks manual link, open in same tab
            manual.addEventListener('click', function(e){
                e.preventDefault();
                window.location.href = finalUrl;
            });

            // If debug parameter present, show debug automatically
            if (qs['debug'] === '1' || qs['debug'] === 'true'){
                debugPanel.style.display = 'block';
                debugPanel.setAttribute('aria-hidden','false');
                toggle.textContent = 'Hide debug info';
            }

            // Accessibility: allow long-press (5s) on logo to toggle debug (useful in kiosks)
            var logoEl = document.querySelector('.logo');
            if (logoEl){
                var pressTimer = null;
                logoEl.addEventListener('mousedown', function(){ pressTimer = setTimeout(function(){ toggle.click(); }, 5000); });
                logoEl.addEventListener('mouseup', function(){ if (pressTimer) clearTimeout(pressTimer); });
                logoEl.addEventListener('touchstart', function(){ pressTimer = setTimeout(function(){ toggle.click(); }, 5000); });
                logoEl.addEventListener('touchend', function(){ if (pressTimer) clearTimeout(pressTimer); });
            }

        })();
    </script>

    <!-- End -->
</body>
</html>
