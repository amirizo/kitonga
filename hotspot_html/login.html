<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kitonga Wi-Fi — Login Required</title>

  <!-- SAFE META REFRESH — ONLY MAC & IP -->
  <meta http-equiv="refresh" content="3;url=https://kitonga.klikcell.com/hotspot/?mac=$(mac)&ip=$(ip)">

  <style>
    body { font-family: Arial, Helvetica, sans-serif; background:#f7fafc; color:#222; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:white; padding:20px 24px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.08); max-width:520px; text-align:center; }
    a.button { display:inline-block; margin-top:12px; padding:10px 14px; background:#2563eb; color:#fff; text-decoration:none; border-radius:8px; transition: background-color 0.3s; }
    a.button:hover { background:#1d4ed8; }
    small { color:#555; }
    .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .countdown { font-weight: bold; color: #2563eb; }
  </style>

  <script>
    // Safer delayed redirect — shared hosting friendly
    setTimeout(function() {
      var mac = '$(mac)';
      var ip = '$(ip)';

      if (mac.includes('$(')) mac = '';
      if (ip.includes('$(')) ip = '';

      var url = 'https://kitonga.klikcell.com/hotspot/?mac=' + 
                encodeURIComponent(mac) + '&ip=' + 
                encodeURIComponent(ip);

      window.location.href = url;
    }, 2000);

    // Countdown Display
    var countdown = 3;
    function updateCountdown() {
      var el = document.getElementById('countdown');
      if (el && countdown >= 0) {
        el.textContent = countdown;
        countdown--;
        setTimeout(updateCountdown, 1000);
      }
    }
    window.onload = updateCountdown;
  </script>
</head>

<body>
  <div class="card">
    <h2>Redirecting to Kitonga captive portal…</h2>
    <div class="spinner"></div>

    <p>Redirecting in <span id="countdown" class="countdown">3</span> seconds...</p>

    <p>If not redirected automatically, click below:</p>

    <a class="button" href="https://kitonga.klikcell.com/hotspot/?mac=$(mac)&ip=$(ip)">
      Continue to portal
    </a>

    <p style="margin-top:12px">
      <small>MAC: $(mac) • IP: $(ip)</small>
    </p>
  </div>
</body>
</html>
