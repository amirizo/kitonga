<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitonga WiFi - Logged Out</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            padding: 30px;
        }
        
        .logout-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .message {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .stat-item:last-child {
            margin-bottom: 0;
        }
        
        .login-again-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-again-btn:hover {
            transform: translateY(-2px);
        }
        
        .thank-you {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logout-icon">👋</div>
            <h1>Logged Out</h1>
            <p>You have been disconnected</p>
        </div>
        
        <div class="content">
            <div class="thank-you">
                <strong>Thank you for using Kitonga WiFi!</strong><br>
                We hope you enjoyed our service.
            </div>
            
            <div class="message">
                You have been successfully logged out from the internet service.
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <span>📱 User:</span>
                    <span>$(username)</span>
                </div>
                <div class="stat-item">
                    <span>⏱️ Session Duration:</span>
                    <span>$(uptime)</span>
                </div>
                <div class="stat-item">
                    <span>⬇️ Downloaded:</span>
                    <span>$(bytes-in-nice)</span>
                </div>
                <div class="stat-item">
                    <span>⬆️ Uploaded:</span>
                    <span>$(bytes-out-nice)</span>
                </div>
            </div>
            
            <button class="login-again-btn" onclick="window.location.href='$(link-login)'">
                🔄 Login Again
            </button>
        </div>
    </div>
</body>
</html>
