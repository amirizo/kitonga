<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitonga WiFi - Logged Out</title>
    
    <!-- Immediate redirect to your portal logout page -->
    <meta http-equiv="refresh" content="2;url=https://kitonga.klikcell.com/?action=logout&username=$(username)&uptime=$(uptime)&bytes_in=$(bytes-in-nice)&bytes_out=$(bytes-out-nice)&source=mikrotik">
    
    <script>
        // Fallback JavaScript redirect after 2 seconds
        setTimeout(function() {
            window.location.href = "https://kitonga.klikcell.com/?action=logout&username=$(username)&uptime=$(uptime)&bytes_in=$(bytes-in-nice)&bytes_out=$(bytes-out-nice)&source=mikrotik";
        }, 2000);
    </script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        .icon {
            font-size: 3em;
            margin: 20px 0;
        }
        .message {
            margin: 20px 0;
            font-size: 1.2em;
        }
        .submessage {
            margin: 15px 0;
            font-size: 1em;
            opacity: 0.9;
        }
        .stats {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9em;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }
        .stat-item:last-child {
            margin-bottom: 0;
        }
        .manual-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            margin-top: 20px;
            transition: background 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .manual-link:hover {
            background: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            color: white;
        }
        .info {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">� Kitonga WiFi</div>
        
        <div class="icon">👋</div>
        
        <div class="message">
            Successfully Logged Out
        </div>
        
        <div class="submessage">
            Thank you for using Kitonga WiFi!
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span>📱 User:</span>
                <span>$(username)</span>
            </div>
            <div class="stat-item">
                <span>⏱️ Session:</span>
                <span>$(uptime)</span>
            </div>
            <div class="stat-item">
                <span>⬇️ Downloaded:</span>
                <span>$(bytes-in-nice)</span>
            </div>
            <div class="stat-item">
                <span>⬆️ Uploaded:</span>
                <span>$(bytes-out-nice)</span>
            </div>
        </div>
        
        <div class="info">
            Redirecting to portal in 2 seconds...
        </div>
        
        <!-- Manual link to portal -->
        <a href="https://kitonga.klikcell.com/?action=logout&username=$(username)&uptime=$(uptime)&bytes_in=$(bytes-in-nice)&bytes_out=$(bytes-out-nice)&source=mikrotik" class="manual-link">
            Continue to Portal
        </a>
    </div>
</body>
</html>
